<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignBridge — ASL Interpreter</title>
<style>
  :root{
    --bg:#08080b;
    --bg2:#111116;
    --bg3:#18181f;
    --border:#22222e;
    --border2:#2e2e3e;
    --text:#e4e4f0;
    --muted:#5a5a72;
    --muted2:#8888a0;
    --accent:#7c6dff;
    --accent2:#a594ff;
    --success:#00d68f;
    --warn:#f5a623;
    --danger:#ff4f4f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* ── TOPBAR ── */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;height:52px;
    border-bottom:1px solid var(--border);
    background:var(--bg2);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-name{font-size:15px;font-weight:700;letter-spacing:0.3px;color:var(--text);}
  .brand-name span{color:var(--accent);}
  .brand-tag{font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border2);padding:2px 8px;border-radius:4px;letter-spacing:0.5px;}

  .topbar-right{display:flex;align-items:center;gap:16px;}

  /* Camera toggle switch */
  .cam-toggle-wrap{display:flex;align-items:center;gap:10px;}
  .cam-toggle-label{font-size:12px;color:var(--muted2);}
  .toggle-switch{position:relative;width:44px;height:24px;cursor:pointer;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-track{
    position:absolute;inset:0;
    background:var(--bg3);border:1px solid var(--border2);
    border-radius:12px;transition:background 0.25s,border-color 0.25s;
  }
  .toggle-thumb{
    position:absolute;top:3px;left:3px;
    width:16px;height:16px;border-radius:50%;
    background:var(--muted);transition:transform 0.25s,background 0.25s;
  }
  .toggle-switch input:checked ~ .toggle-track{background:rgba(124,109,255,0.2);border-color:var(--accent);}
  .toggle-switch input:checked ~ .toggle-thumb{transform:translateX(20px);background:var(--accent);}

  /* Status pill */
  .status-pill{
    display:flex;align-items:center;gap:6px;
    font-size:11px;padding:4px 12px;border-radius:20px;
    background:rgba(0,214,143,0.08);border:1px solid rgba(0,214,143,0.18);
    color:var(--success);transition:all 0.3s;
  }
  .status-pill.off{background:rgba(90,90,114,0.1);border-color:var(--border2);color:var(--muted);}
  .status-pill.error{background:rgba(255,79,79,0.08);border-color:rgba(255,79,79,0.2);color:var(--danger);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .dot.pulse{animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  /* ── MAIN GRID ── */
  .main{display:grid;grid-template-columns:1fr 320px;flex:1;overflow:hidden;}

  /* ── LEFT: CAMERA ── */
  .cam-panel{display:flex;flex-direction:column;padding:20px;gap:0;overflow:hidden;}

  .cam-wrap{
    position:relative;border-radius:14px;overflow:hidden;
    background:#000;flex:1;
    border:1px solid var(--border);
  }
  .cam-wrap video,.cam-wrap canvas{
    position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
  }
  canvas{z-index:2;}

  .cam-overlay-tl{
    position:absolute;top:12px;left:12px;z-index:5;
    font-size:10px;color:rgba(255,255,255,0.45);
    background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);
    padding:3px 10px;border-radius:5px;letter-spacing:0.5px;
  }
  .cam-overlay-tr{
    position:absolute;top:12px;right:12px;z-index:5;
  }
  .fps-chip{
    font-size:10px;color:var(--success);
    background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
    padding:3px 8px;border-radius:5px;
  }

  /* Hold ring overlay */
  .hold-ring-wrap{
    position:absolute;bottom:0;left:0;right:0;z-index:5;
    display:flex;justify-content:center;padding-bottom:16px;
    pointer-events:none;
  }
  .hold-ring-svg{opacity:0;transition:opacity 0.2s;}
  .hold-ring-svg.visible{opacity:1;}
  .hold-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4;}
  .hold-arc{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;
    stroke-dasharray:220;stroke-dashoffset:220;transition:stroke-dashoffset 0.1s linear;transform-origin:center;transform:rotate(-90deg);}

  /* No-camera placeholder */
  .cam-placeholder{
    position:absolute;inset:0;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--muted);background:var(--bg2);
  }
  .cam-placeholder svg{opacity:0.3;}
  .cam-placeholder p{font-size:13px;}

  /* ── RIGHT PANEL ── */
  .right-panel{
    border-left:1px solid var(--border);
    display:flex;flex-direction:column;
    overflow:hidden;
  }

  .r-section{padding:16px 18px;border-bottom:1px solid var(--border);}
  .r-section:last-child{border-bottom:none;flex:1;}

  .sec-label{
    font-size:10px;letter-spacing:1.2px;color:var(--muted);
    text-transform:uppercase;margin-bottom:12px;
  }

  /* Letter display */
  .letter-display{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;
  }
  .letter-big{
    font-size:88px;font-weight:800;color:var(--accent);
    line-height:1;min-width:90px;text-align:center;
    transition:color 0.2s;
    font-variant-numeric:tabular-nums;
  }
  .letter-big.nothing{color:var(--muted);font-size:40px;}

  .conf-block{flex:1;}
  .conf-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px;}
  .conf-pct{font-weight:600;transition:color 0.2s;}
  .conf-pct.high{color:var(--success);}
  .conf-pct.mid{color:var(--warn);}
  .conf-pct.low{color:var(--danger);}
  .conf-bar{height:5px;border-radius:3px;background:var(--border2);overflow:hidden;margin-bottom:10px;}
  .conf-fill{height:100%;border-radius:3px;transition:width 0.18s,background 0.2s;background:var(--accent);}
  .conf-fill.high{background:var(--success);}
  .conf-fill.mid{background:var(--warn);}
  .conf-fill.low{background:var(--danger);}

  /* Top 3 */
  .top3-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
  .top3-row:last-child{margin-bottom:0;}
  .t3-l{width:20px;font-weight:700;color:var(--accent2);}
  .t3-bar-wrap{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
  .t3-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 0.18s;opacity:0.55;}
  .t3-c{width:38px;text-align:right;color:var(--muted2);font-size:11px;}

  /* Word builder */
  .word-display{
    background:var(--bg3);border:1px solid var(--border2);
    border-radius:10px;padding:12px 14px;
    font-size:20px;font-weight:700;
    min-height:48px;letter-spacing:2px;
    word-break:break-all;
    font-family:'Courier New',monospace;
    color:var(--text);
  }
  .cursor{display:inline-block;width:2px;height:18px;background:var(--accent);margin-left:1px;vertical-align:middle;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  .word-actions{display:flex;gap:8px;margin-top:8px;}
  .btn-sm{
    flex:1;padding:7px 0;border-radius:8px;
    border:1px solid var(--border2);background:var(--bg3);
    color:var(--muted2);font-size:12px;cursor:pointer;
    transition:all 0.18s;
  }
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm.danger:hover{border-color:var(--danger);color:var(--danger);}

  /* Sentence builder */
  .sentence-display{
    background:var(--bg3);border:1px solid var(--border2);
    border-radius:10px;padding:12px 14px;
    font-size:13px;line-height:1.6;
    min-height:60px;max-height:90px;
    overflow-y:auto;color:var(--muted2);
    font-style:italic;
  }
  .sentence-display.has-text{color:var(--text);font-style:normal;}
  .sentence-actions{display:flex;gap:8px;margin-top:8px;}

  /* Bottom status bar */
  .statusbar{
    height:28px;border-top:1px solid var(--border);
    background:var(--bg2);
    display:flex;align-items:center;padding:0 20px;
    gap:20px;font-size:10px;color:var(--muted);
    flex-shrink:0;letter-spacing:0.3px;
  }
  .sb-item{display:flex;align-items:center;gap:5px;}
  .sb-dot{width:5px;height:5px;border-radius:50%;background:var(--success);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-name">Sign<span>Bridge</span></div>
    <div class="brand-tag">ASL · Real-Time</div>
  </div>
  <div class="topbar-right">
    <!-- Camera toggle switch -->
    <div class="cam-toggle-wrap">
      <span class="cam-toggle-label">Camera</span>
      <label class="toggle-switch" title="Toggle camera">
        <input type="checkbox" id="camToggle" checked onchange="handleCamToggle(this)"/>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <!-- Status pill -->
    <div class="status-pill" id="statusPill">
      <div class="dot pulse" id="statusDot"></div>
      <span id="statusText">Initialising...</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CAMERA PANEL -->
  <div class="cam-panel">
    <div class="cam-wrap" id="camWrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>

      <div class="cam-overlay-tl">MediaPipe · MobileNetV2</div>
      <div class="cam-overlay-tr"><span class="fps-chip" id="fpsChip">-- fps</span></div>

      <!-- Hold-to-confirm ring -->
      <div class="hold-ring-wrap">
        <svg class="hold-ring-svg" id="holdRing" width="72" height="72" viewBox="0 0 72 72">
          <circle class="hold-bg" cx="36" cy="36" r="30"/>
          <circle class="hold-arc" id="holdArc" cx="36" cy="36" r="30"/>
        </svg>
      </div>

      <!-- Placeholder when camera off -->
      <div class="cam-placeholder" id="camPlaceholder" style="display:none;">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          <line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
        <p>Camera is off</p>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Letter + Confidence -->
    <div class="r-section">
      <div class="sec-label">Detected Letter</div>
      <div class="letter-display">
        <div class="letter-big nothing" id="letterBig">—</div>
        <div class="conf-block">
          <div class="conf-row">
            <span style="color:var(--muted2);font-size:11px;">Confidence</span>
            <span class="conf-pct" id="confVal">0%</span>
          </div>
          <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
          <!-- Top 3 -->
          <div id="top3">
            <div class="top3-row"><span class="t3-l">—</span><div class="t3-bar-wrap"><div class="t3-bar" style="width:0%"></div></div><span class="t3-c">—</span></div>
            <div class="top3-row"><span class="t3-l">—</span><div class="t3-bar-wrap"><div class="t3-bar" style="width:0%"></div></div><span class="t3-c">—</span></div>
            <div class="top3-row"><span class="t3-l">—</span><div class="t3-bar-wrap"><div class="t3-bar" style="width:0%"></div></div><span class="t3-c">—</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Word builder -->
    <div class="r-section">
      <div class="sec-label">Word</div>
      <div class="word-display" id="wordDisplay"><span class="cursor"></span></div>
      <div class="word-actions">
        <button class="btn-sm" onclick="addSpace()">Space</button>
        <button class="btn-sm" onclick="deleteLast()">⌫ Delete</button>
        <button class="btn-sm danger" onclick="clearWord()">Clear</button>
      </div>
    </div>

    <!-- Sentence builder -->
    <div class="r-section" style="flex:1;display:flex;flex-direction:column;">
      <div class="sec-label">Sentence</div>
      <div class="sentence-display" id="sentenceDisplay">Start signing to build a sentence...</div>
      <div class="sentence-actions">
        <button class="btn-sm" onclick="pushWordToSentence()">+ Add Word</button>
        <button class="btn-sm danger" onclick="clearSentence()">Clear</button>
      </div>
    </div>

  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="sb-item"><div class="sb-dot" id="sbDot"></div><span id="sbModel">MobileNetV2</span></div>
  <div class="sb-item"><span id="sbDevice">—</span></div>
  <div class="sb-item"><span id="sbUptime">Uptime: 0s</span></div>
  <div class="sb-item" style="margin-left:auto;color:var(--muted);opacity:0.6;">Hold steady for 18 frames to confirm a letter</div>
</div>

<script>
  const video     = document.getElementById('video');
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const HOLD_NEEDED = 18;
  const CIRCUM    = 2 * Math.PI * 30; // ~188.5

  let running    = false;
  let stream     = null;
  let word       = '';
  let sentence   = '';
  let lastLetter = null;
  let holdCount  = 0;
  let frameCount = 0;
  let fpsTimer   = Date.now();
  let startTime  = Date.now();

  // ── CAMERA ──────────────────────────────────────────────
  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
      video.srcObject = stream;
      running = true;
      document.getElementById('camPlaceholder').style.display = 'none';
      setStatus('active','Camera Active');
      requestAnimationFrame(loop);
    } catch(e){
      setStatus('error','Camera Error');
      document.getElementById('camToggle').checked = false;
    }
  }

  function stopCamera(){
    if(stream) stream.getTracks().forEach(t=>t.stop());
    running = false;
    video.srcObject = null;
    document.getElementById('camPlaceholder').style.display = 'flex';
    setStatus('off','Camera Off');
    document.getElementById('letterBig').textContent = '—';
    document.getElementById('letterBig').className = 'letter-big nothing';
    document.getElementById('confVal').textContent = '0%';
    document.getElementById('confFill').style.width = '0%';
    document.getElementById('holdRing').classList.remove('visible');
  }

  function handleCamToggle(cb){
    if(cb.checked) startCamera();
    else stopCamera();
  }

  function setStatus(state, text){
    const pill = document.getElementById('statusPill');
    const dot  = document.getElementById('statusDot');
    const span = document.getElementById('statusText');
    pill.className = 'status-pill' + (state==='active'?'':' '+(state==='off'?'off':'error'));
    dot.className  = 'dot' + (state==='active'?' pulse':'');
    span.textContent = text;
  }

  // ── MAIN LOOP ────────────────────────────────────────────
  async function loop(){
    if(!running) return;

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0);
    const b64 = canvas.toDataURL('image/jpeg', 0.7);

    // FPS counter
    frameCount++;
    const now = Date.now();
    if(now - fpsTimer >= 1000){
      document.getElementById('fpsChip').textContent = frameCount + ' fps';
      frameCount = 0; fpsTimer = now;
    }

    try{
      const resp = await fetch('/api/predict',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({frame: b64})
      });
      const data = await resp.json();
      updateUI(data);
      if(data.annotated){
        const img = new Image();
        img.onload = ()=> ctx.drawImage(img,0,0,canvas.width,canvas.height);
        img.src = data.annotated;
      }
    } catch(e){}

    setTimeout(()=> requestAnimationFrame(loop), 100);
  }

  // ── UI UPDATE ────────────────────────────────────────────
  function updateUI(data){
    const letter = data.letter;
    const conf   = data.confidence || 0;

    // Letter
    const lb = document.getElementById('letterBig');
    if(letter && letter !== 'nothing'){
      lb.textContent = letter.toUpperCase();
      lb.className = 'letter-big';
    } else {
      lb.textContent = '—';
      lb.className = 'letter-big nothing';
    }

    // Confidence color
    const tier = conf >= 90 ? 'high' : conf >= 75 ? 'mid' : 'low';
    document.getElementById('confVal').textContent = conf + '%';
    document.getElementById('confVal').className = 'conf-pct ' + (conf>0?tier:'');
    const fill = document.getElementById('confFill');
    fill.style.width = conf + '%';
    fill.className = 'conf-fill ' + (conf>0?tier:'');

    // Hold-to-confirm ring
    if(letter && letter !== 'nothing'){
      if(letter === lastLetter){
        holdCount = Math.min(holdCount+1, HOLD_NEEDED);
      } else {
        lastLetter = letter; holdCount = 1;
      }
      const progress = holdCount / HOLD_NEEDED;
      const offset   = CIRCUM * (1 - progress);
      document.getElementById('holdArc').style.strokeDashoffset = offset;
      document.getElementById('holdRing').classList.add('visible');

      if(holdCount >= HOLD_NEEDED){
        pushLetter(letter);
        holdCount = 0;
        document.getElementById('holdArc').style.strokeDashoffset = CIRCUM;
      }
    } else {
      holdCount = 0; lastLetter = null;
      document.getElementById('holdRing').classList.remove('visible');
      document.getElementById('holdArc').style.strokeDashoffset = CIRCUM;
    }

    // Top 3
    const top3 = data.top3 || [];
    const rows  = document.getElementById('top3').querySelectorAll('.top3-row');
    rows.forEach((row,i)=>{
      const item = top3[i] || {letter:'—',conf:0};
      row.querySelector('.t3-l').textContent = item.letter || '—';
      row.querySelector('.t3-bar').style.width = (item.conf||0) + '%';
      row.querySelector('.t3-c').textContent   = item.conf ? item.conf+'%' : '—';
    });
  }

  // ── WORD / SENTENCE ──────────────────────────────────────
  function pushLetter(letter){
    if(letter === 'space'){ word += ' '; }
    else if(letter === 'del'){ word = word.slice(0,-1); }
    else if(letter !== 'nothing'){ word += letter.toUpperCase(); }
    renderWord();
    fetch('/api/word/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({letter})});
  }

  function renderWord(){
    document.getElementById('wordDisplay').innerHTML =
      (word||'') + '<span class="cursor"></span>';
  }

  function clearWord(){ word=''; renderWord(); fetch('/api/word/clear',{method:'POST'}); }
  function deleteLast(){ word=word.slice(0,-1); renderWord(); }
  function addSpace(){ word+=' '; renderWord(); }

  function pushWordToSentence(){
    const w = word.trim();
    if(!w) return;
    sentence += (sentence?' ':'') + w;
    word = '';
    renderWord();
    const sd = document.getElementById('sentenceDisplay');
    sd.textContent = sentence;
    sd.className = 'sentence-display has-text';
    fetch('/api/word/clear',{method:'POST'});
  }

  function clearSentence(){
    sentence = '';
    const sd = document.getElementById('sentenceDisplay');
    sd.textContent = 'Start signing to build a sentence...';
    sd.className = 'sentence-display';
  }

  // ── KEYBOARD SHORTCUTS ───────────────────────────────────
  document.addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); addSpace(); }
    if(e.code==='Backspace'){ deleteLast(); }
    if(e.code==='Enter'){ pushWordToSentence(); }
  });

  // ── STATUS BAR ───────────────────────────────────────────
  async function checkStatus(){
    try{
      const r = await fetch('/api/status');
      const d = await r.json();
      document.getElementById('sbModel').textContent = d.model || 'MobileNetV2';
      document.getElementById('sbDevice').textContent = (d.device||'cpu').toUpperCase();
    } catch(e){}
  }

  setInterval(()=>{
    const s = Math.floor((Date.now()-startTime)/1000);
    const m = Math.floor(s/60), sec = s%60;
    document.getElementById('sbUptime').textContent =
      'Uptime: ' + (m>0?m+'m ':'')+sec+'s';
  }, 1000);

  window.onload = ()=>{ checkStatus(); startCamera(); };
</script>
</body>
</html>
